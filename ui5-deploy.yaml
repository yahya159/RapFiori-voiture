# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zyeg
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://afb8637d-43ab-41e3-8743-e5ea9e7a5e6f.abap.us10.hana.ondemand.com
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZYEG_VOITURE
          package: ZYEG_VOITURE
          transport: ''
        exclude:
          - /test/
